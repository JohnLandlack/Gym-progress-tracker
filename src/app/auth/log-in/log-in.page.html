<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Log-in</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="goToRegister()">
        <ion-chip [outline]="true" color="white">Register</ion-chip>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Log-in</ion-title>
    </ion-toolbar>
  </ion-header>

  <form #LogInForm="ngForm" (ngSubmit)="onLogIn(LogInForm)">

    <ion-grid>
  <ion-row>
    <ion-col size-sm="6" offset-sm="3"> <!-- sm da bi na manjim uredjajima bila normalna sirina -->
      <ion-list>
<ion-item>
  <ion-label position="floating">Email</ion-label>
  <ion-input type="email" ngModel name="email" required email #email="ngModel"></ion-input>
</ion-item>

@if (email.invalid && email.touched) {
  <ion-item lines="none">
    <ion-label>Should be a valid email address.</ion-label>
  </ion-item>
} <!-- prikazuje upozorenje ukoliko email nije validno unesen -->




<ion-item>
  <ion-label position="floating">Password</ion-label>
  <ion-input type="password" ngModel name="password" required minlength="7" #password="ngModel"></ion-input>
</ion-item>

@if (password.invalid && password.touched) {
  <ion-item lines="none">
    <ion-label>Should be a minimum 7 characters long.</ion-label>
  </ion-item>
} <!-- prikazuje upozorenje ukoliko password nije validno unesen -->

</ion-list>
    </ion-col>
  </ion-row>

<ion-row>
  <ion-col size-sm="6" offset-sm="3"> <!-- deljenje na pola i centriranje -->
    <div class="ion-text-center">
      <ion-spinner color="secondary" *ngIf="isLoading"></ion-spinner>
    </div>
    <ion-button type="submit" expand="block" shape="round" [disabled]="LogInForm.invalid" >Log in</ion-button>
  </ion-col>
</ion-row>

</ion-grid>



  </form>













</ion-content>
