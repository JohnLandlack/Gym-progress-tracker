<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>log-in</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Log-in</ion-title>
    </ion-toolbar>
  </ion-header>

  <form #LogInForm="ngForm" (ngSubmit)="onLogIn(LogInForm)">

    <ion-grid>
  <ion-row>
    <ion-col size-sm="6" offset-sm="3"> <!-- sm da bi na manjim uredjajima bila normalna sirina -->
      <ion-list>
<ion-item>
  <ion-label position="floating">Email</ion-label>
  <ion-input type="email" ngModel name="email" required email></ion-input>
</ion-item>
<ion-item>
  <ion-label position="floating">Password</ion-label>
  <ion-input type="password" ngModel name="password" required minlength="7"></ion-input>
</ion-item>

</ion-list>
    </ion-col>
  </ion-row>

<ion-row>
  <ion-col size-sm="6" offset-sm="3"> <!-- deljenje na pola i centriranje -->
    <ion-button type="submit" expand="block" shape="round" >Log in</ion-button>
  </ion-col>
</ion-row>

</ion-grid>



  </form>













</ion-content>
