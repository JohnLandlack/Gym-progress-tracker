<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>  <!-- ovde je burger meni  -->
    </ion-buttons>

    <ion-title>add-exercise</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">add-exercise</ion-title>
    </ion-toolbar>
  </ion-header>


  <ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let ex of exercises"> 
        <ion-card (click)="addWeight(ex.name)" class="exercise-card">
          <img [src]="ex.image" />
          <ion-card-header>
            <ion-card-title>{{ ex.name }}</ion-card-title>
            <ion-card-subtitle>{{ ex.muscle }}</ion-card-subtitle>
          </ion-card-header> <!-- u ovom delu koda se iscitavaju vezbe stavljene u ts-u -->
          
          <div class="add-icon">
            <ion-icon name="add-circle" color="primary"></ion-icon>
          </div>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>





</ion-content>
