<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>  <!-- ovde je burger meni  -->
    </ion-buttons>


    <ion-title class="ion-text-center">Workout Log</ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/add-exercise"></ion-button>
      <ion-icon name="add-sharp" slot="icon-only"></ion-icon>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">workout-log</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">

    @if (isLoading) {
    <div class="ion-text-center ion-margin-top">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <p>Loading...</p>
    </div>
  } @else {
    <ion-list>
  @for (ex of loadedExercises; track ex.id) {
    <ion-item-sliding #slidingItem>
      <ion-item>
        <ion-icon name="barbell-outline" slot="start" color="tertiary"></ion-icon>
        <ion-label>
          <h2><strong>{{ ex.name }}</strong></h2>
          <p>{{ ex.sets }} serija x {{ ex.reps }} ponavljanja</p>
        </ion-label>
        <ion-badge color="success" slot="end">{{ ex.weight }} kg</ion-badge>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="onDelete(ex.id, slidingItem)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  } @empty {
    <div class="ion-text-center ion-margin-top">
      <p>Nema unetih treninga.</p>
    </div>
  }
</ion-list>

  }
  
  

</ion-content>

  



</ion-content>
